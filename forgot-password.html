<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - SRRN Billing</title>
    <link rel="stylesheet" href="auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <!-- Forgot Password Box -->
        <div class="auth-box" id="forgotBox">
            <div class="auth-header">
                <h2>Reset Password</h2>
                <p>Enter a new password for your account</p>
            </div>
            
            <form id="forgotForm" class="auth-form">
                <div class="form-group">
                    <label for="forgotUsername">Username</label>
                    <input type="text" id="forgotUsername" required placeholder="Enter your username">
                </div>
                
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" required placeholder="Enter new password">
                </div>
                
                <button type="submit" class="auth-btn">Reset Password</button>
            </form>
            
            <div class="auth-footer">
                <p>Remember your password? <a href="login.html">Sign in here</a></p>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast hidden"></div>

    <script src="auth.js"></script>
</body>
</html>
